datasets:

  raw_etf_prices: 

    description: Raw ETF price data downloaded from the provider

    layer: raw
    path: etf_prices
    format: csv

  bronze_prices:

    description: ETF price data in parquet format, partitioned by date

    layer: bronze
    path: etf_prices
    version: v1
    format: parquet

    partition_by:
      - date


  silver_returns:

    description: Daily returns computed from ETF prices

    layer: silver
    path: etf_returns
    version: v1
    format: parquet

    partition_by:
      - ticker


  gold_rolling_metrics:

    description: Rolling risk metrics for ETFs (volatility, sharpe, etc.)

    layer: gold
    path: rolling_metrics
    version: v1
    format: parquet

    partition_by:
      - ticker


  gold_correlation_matrix:

    description: Time-varying correlation matrices between ETFs

    layer: gold
    path: correlation_matrix
    version: v1
    format: parquet

    partition_by:
      - date


  gold_drawdowns:

    description: Drawdown time series for ETFs

    layer: gold
    path: drawdowns
    version: v1
    format: parquet

    partition_by:
      - ticker
